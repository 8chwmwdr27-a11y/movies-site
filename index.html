<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>MOVIES.pop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>MOVIES.pop</h1>
</header>

<div id="userArea"></div>

<!-- סדרות -->
<h2>📺 צפוף</h2>
<div class="grid" id="seasons"></div>

<!-- פרקים (נפתח בלחיצה) -->
<div id="episodesSection">
  <h2 id="seasonTitle"></h2>
  <button onclick="closeEpisodes()">⬅ חזור</button>
  <div class="grid" id="episodes"></div>
</div>

<!-- סרטים -->
<h2>🎬 סרטים</h2>
<div class="grid" id="movies"></div>

<!-- נגן -->
<div id="playerContainer">
  <iframe id="player" allowfullscreen></iframe>
</div>

<!-- הרשמה -->
<div id="registerPopup">
  <div class="popupBox">
    <h2>הירשם כדי לצפות</h2>
    <input id="username" placeholder="שם משתמש">
    <input id="email" placeholder="אימייל">
    
    <label>
      <input type="checkbox">
      מאשר קבלת עדכונים
    </label>

    <button onclick="register()">הרשמה</button>
    <button onclick="closePopup()">סגור</button>

    <p onclick="showPrivacy()">תנאי פרטיות</p>
  </div>
</div>

<div id="privacyBox">
  <h2>תנאי פרטיות - MOVIES.pop</h2>
  <p>המידע נשמר לשימוש האתר בלבד.</p>
</div>

<script src="script.js"></script>
</body>
</html>
