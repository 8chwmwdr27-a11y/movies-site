<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVIES.pop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- מסך פרסומת -->
<div id="adScreen">
  <div id="adBackground"></div>
  <img id="adLogo" src="images/logo.png" alt="MOVIES.pop">
  <h1>MOVIES.pop</h1>
</div>

<!-- קונטיינר ראשי -->
<div id="appContainer" class="hidden">
  <header>
    <h1>MOVIES.pop</h1>
    <div id="userInfo"></div>
  </header>

  <!-- פופאפ הרשמה -->
  <div id="registerPopup" class="popup hidden">
    <h2>ברוכים הבאים!</h2>
    <input type="text" id="username" placeholder="שם משתמש">
    <input type="email" id="email" placeholder="אימייל לעדכונים">
    <label><input type="checkbox" id="newsletter"> שלח עדכונים למייל</label>
    <p>בלחיצה על "תנאי פרטיות" תפתח תנאי פרטיות רשמיים</p>
    <button onclick="registerUser()">הרשם</button>
  </div>

  <!-- סרטים -->
  <section>
    <h2>🎬 סרטים</h2>
    <div id="movies" class="grid"></div>
  </section>

  <!-- סדרות -->
  <section>
    <h2>📺 סדרות</h2>
    <div id="seasons" class="grid"></div>
  </section>

  <!-- נגן -->
  <div id="playerContainer">
    <iframe id="player" src="" allowfullscreen></iframe>
    <button onclick="closePlayer()" class="closeBtn">✖</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
