<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>MOVIES.pop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>MOVIES.pop</h1>
</header>

<div id="userArea"></div>

<!-- סדרה -->
<h2>📺 צפוף</h2>
<div class="grid" id="series"></div>

<!-- סרטים -->
<h2>🎬 סרטים</h2>
<div class="grid" id="movies"></div>

<!-- נגן -->
<div id="playerContainer">
  <iframe id="player" allowfullscreen></iframe>
</div>

<!-- פופאפ הרשמה -->
<div id="registerPopup">
  <div class="popupBox">
    <h2>הירשם כדי לצפות</h2>
    <input id="username" placeholder="שם משתמש">
    <input id="email" placeholder="אימייל">
    
    <label>
      <input type="checkbox" id="updates">
      מאשר קבלת עדכונים
    </label>

    <button onclick="register()">הרשמה</button>
    <button onclick="closePopup()">סגור</button>

    <p onclick="showPrivacy()">תנאי פרטיות</p>
  </div>
</div>

<!-- תנאי פרטיות -->
<div id="privacyBox">
  <h2>תנאי פרטיות - MOVIES.pop</h2>
  <p>
  האתר שומר שם משתמש ואימייל בלבד.
  המידע לא מועבר לצד שלישי.
  ניתן להסיר מידע בכל עת.
  </p>
</div>

<script src="script.js"></script>
</body>
</html>
